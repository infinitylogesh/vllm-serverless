model:
  name: Qwen/Qwen3.6-27B-FP8
  serve_name: qwen3.6-27b
  revision: null
  max_model_len: null
  multi_modal: true
  gpu_memory_utilization: 0.85

service:
  name: private-llm
  image: vllm/vllm-openai:latest
  gpu: A100-80GB # T4, L4, L4S, A10, A100, H100, etc.
  n_gpu: 1
  port: 8000
  startup_timeout: 10
  max_concurrent_requests: 4 # how many requests can one replica handle? tune carefully!
  scaledown_window: 10 #  how long should we stay up with no requests? minutes
  timeout: 10 # how long should we wait for container start? minutes
  fast_boot: false # CUDA graphs compiled once and captured in GPU snapshot
  volumes:
    - name: huggingface-cache
      path: /root/.cache/huggingface
    - name: vllm-cache
      path: /root/.cache/vllm
  secrets: # create secrets in modal dashboard.
    - name: vllm-api-key
      env_var: VLLM_API_KEY
    - name: huggingface-secret
      env_var: HF_TOKEN
  pip_install:
    - pyyaml
    - requests
  env:
    HF_XET_HIGH_PERFORMANCE: '1'
    HF_HOME: /root/.cache/huggingface
    HUGGINGFACE_HUB_CACHE: /root/.cache/huggingface/hub
    VLLM_WORKER_MULTIPROC_METHOD: spawn
    SAFETENSORS_FAST_GPU: '1'
    NCCL_IB_DISABLE: '1'
    OMP_NUM_THREADS: '8'
    VLLM_SERVER_DEV_MODE: '1'          # enables /sleep and /wake_up endpoints
    TORCHINDUCTOR_COMPILE_THREADS: '1' # required for snapshot compatibility
  min_containers: 0
  max_containers: 1